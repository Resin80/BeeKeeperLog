<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Honeycomb Hexagon Background -->
  <path d="M50 5 L90 27.5 L90 72.5 L50 95 L10 72.5 L10 27.5 Z" fill="#FFF7E6" stroke="#FFB900" stroke-width="2"/>
  
  <!-- Bee Body -->
  <ellipse cx="50" cy="55" rx="25" ry="30" fill="#FFB900" stroke="#332B00" stroke-width="2"/>
  
  <!-- Bee Stripes -->
  <path d="M30 45 Q 50 40 70 45" fill="none" stroke="#332B00" stroke-width="4" stroke-linecap="round"/>
  <path d="M26 55 Q 50 50 74 55" fill="none" stroke="#332B00" stroke-width="5" stroke-linecap="round"/>
  <path d="M30 65 Q 50 60 70 65" fill="none" stroke="#332B00" stroke-width="4" stroke-linecap="round"/>

  <!-- Wings -->
  <ellipse cx="38" cy="35" rx="12" ry="18" fill="white" fill-opacity="0.7" stroke="#ACCBFF" stroke-width="1" transform="rotate(-30 38 35)"/>
  <ellipse cx="62" cy="35" rx="12" ry="18" fill="white" fill-opacity="0.7" stroke="#ACCBFF" stroke-width="1" transform="rotate(30 62 35)"/>

  <!-- Eyes -->
  <circle cx="42" cy="48" r="2.5" fill="#332B00"/>
  <circle cx="58" cy="48" r="2.5" fill="#332B00"/>

  <!-- Antennae -->
  <path d="M46 38 Q 42 28 36 28" fill="none" stroke="#332B00" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M54 38 Q 58 28 64 28" fill="none" stroke="#332B00" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Stinger -->
  <path d="M50 85 L48 92 L52 92 Z" fill="#332B00"/>
</svg>
